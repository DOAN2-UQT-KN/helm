apiVersion: v2
name: da2-umbrella
description: Umbrella chart for DA2 microservices application
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  # Databases
  - name: postgresql
    version: "15.2.5"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql-auth.enabled
    alias: postgresql-auth
  - name: postgresql
    version: "15.2.5"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql-user.enabled
    alias: postgresql-user
  
  # Microservices
  - name: auth-service
    version: 0.1.0
    repository: "file://../charts/auth-service"
    condition: auth-service.enabled
  - name: user-service
    version: 0.1.0
    repository: "file://../charts/user-service"
    condition: user-service.enabled
  - name: api-gateway
    version: 0.1.0
    repository: "file://../charts/api-gateway"
    condition: api-gateway.enabled
