apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "incident-service.fullname" . }}
  labels:
    {{- include "incident-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "incident-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "incident-service.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "incident-service.serviceAccountName" . }}
      {{- if .Values.localstackHostReachability.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- if and .Values.localstackHostReachability.enabled .Values.localstackHostReachability.hostAliasIp }}
      hostAliases:
        - ip: {{ .Values.localstackHostReachability.hostAliasIp | quote }}
          hostnames:
            - {{ .Values.localstackHostReachability.host | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        {{- if .Values.startupProbe }}
        startupProbe:
          {{- toYaml .Values.startupProbe | nindent 12 }}
        {{- end }}
        {{- if .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        {{- end }}
        {{- if .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        env:
          {{- toYaml .Values.env | nindent 12 }}
          {{- if .Values.localstackHostReachability.enabled }}
            - name: AWS_SQS_ENDPOINT
              value: "http://{{ .Values.localstackHostReachability.host }}:{{ .Values.localstackHostReachability.port }}"
            - name: SQS_REPORT_ANALYSIS_QUEUE_URL
              value: "http://{{ .Values.localstackHostReachability.host }}:{{ .Values.localstackHostReachability.port }}/000000000000/{{ .Values.localstackHostReachability.queueName }}"
          {{- else if .Values.sqsReportAnalysisQueueUrl }}
            {{- if .Values.awsSqsEndpoint }}
            - name: AWS_SQS_ENDPOINT
              value: {{ .Values.awsSqsEndpoint | quote }}
            {{- end }}
            - name: SQS_REPORT_ANALYSIS_QUEUE_URL
              value: {{ .Values.sqsReportAnalysisQueueUrl | quote }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
