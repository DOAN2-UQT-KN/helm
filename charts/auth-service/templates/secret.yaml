apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auth-service.fullname" . }}-db-secret
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: "postgresql://auth:{{ .Values.database.password }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}?schema=public"
  jwt-secret: {{ .Values.jwt.secret | quote }}
