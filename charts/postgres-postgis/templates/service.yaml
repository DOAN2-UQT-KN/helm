apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgres-postgis.fullname" . }}
  labels:
{{ include "postgres-postgis.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
{{ include "postgres-postgis.selectorLabels" . | indent 4 }}
