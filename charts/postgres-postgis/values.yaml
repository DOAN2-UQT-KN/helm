replicaCount: 1

image:
  repository: postgis/postgis
  pullPolicy: IfNotPresent
  tag: "17-3.5"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 5432

ingress:
  enabled: false
  className: traefik
  annotations: {}
  hosts:
    - host: db.ecolink.id.vn
      paths:
        - path: /
          pathType: Prefix
  tls: []

tcpIngress:
  enabled: true
  entryPoints:
    - postgresql
  hostSNI: "*"
  tls:
    enabled: false
    passthrough: false

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 5Gi

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

auth:
  username: postgres
  password: password

# Databases created on first bootstrap.
databases:
  - identitydb
  - monolith_db

nodeSelector: {}
tolerations: []
affinity: {}

livenessProbe:
  tcpSocket:
    port: 5432
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  tcpSocket:
    port: 5432
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 6
